<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: "Courier New", monospace;
      color: #c8c4be;
    }

    #game-container {
      flex: 1;
      min-height: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      position: relative;
    }

    /* ---- Chat Bar ---- */
    #chat-bar {
      width: 640px;
      max-width: 90vw;
      height: 180px;
      background: #0d0b09;
      border: 1px solid #2a2520;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      margin: 0 auto;
      margin-bottom: 24px;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Agent tabs */
    #agent-tabs {
      display: flex;
      border-bottom: 1px solid #1a1816;
      height: 32px;
      flex-shrink: 0;
    }

    .agent-tab {
      padding: 6px 16px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      color: #6a655e;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .agent-tab:hover {
      color: #a09a90;
    }

    .agent-tab.active {
      color: #c8c4be;
      border-bottom-color: var(--agent-color, #c8c4be);
    }

    /* Chat messages area */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-size: 13px;
      line-height: 1.5;
      scrollbar-width: thin;
      scrollbar-color: #2a2520 #0d0b09;
    }

    #chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    #chat-messages::-webkit-scrollbar-track {
      background: #0d0b09;
    }
    #chat-messages::-webkit-scrollbar-thumb {
      background: #2a2520;
      border-radius: 3px;
    }

    .msg {
      margin-bottom: 8px;
    }

    .msg-user {
      color: #8a857e;
    }

    .msg-user::before {
      content: "> ";
      color: #5a5550;
    }

    .msg-agent {
      color: #c8c4be;
      border-left: 2px solid var(--agent-color, #c8c4be);
      padding-left: 10px;
    }

    .msg-agent .msg-name {
      font-size: 10px;
      color: var(--agent-color, #8a857e);
      margin-bottom: 2px;
    }

    #chat-empty {
      color: #6a655e;
      font-size: 12px;
    }

    /* Input area */
    #chat-input-area {
      display: flex;
      align-items: center;
      border-top: 1px solid #1a1816;
      padding: 0 12px;
      height: 36px;
      flex-shrink: 0;
    }

    #chat-input-area .prompt-char {
      color: #5a5550;
      margin-right: 8px;
      font-size: 14px;
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #c8c4be;
      font-family: "Courier New", monospace;
      font-size: 13px;
      outline: none;
    }

    #chat-input::placeholder {
      color: #6a655e;
    }

    #chat-loading {
      color: #5a5550;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="chat-bar">
    <div id="agent-tabs"></div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <span class="prompt-char">></span>
      <input id="chat-input" type="text" placeholder="select an agent..." autocomplete="off" />
      <span id="chat-loading"></span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
